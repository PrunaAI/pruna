name: 'Mark stale issues and PRs'

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: 'This issue has been inactive for 30 days and is now marked as stale. It will be closed in 7 days if there is no further activity.'
          close-issue-message: 'Closing this issue due to inactivity. Please reopen it or create a new issue if this is still relevant.'
          exempt-issue-labels: 'pinned,security,do-not-close'

          # PRs
          days-before-pr-stale: 10
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: 'This PR has been inactive for 10 days and is now marked as stale.'