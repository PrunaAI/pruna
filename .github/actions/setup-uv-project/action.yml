name: setup-uv-project
description: Install uv and set up the project with its dependencies

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v6
      with:
        version: ">=0.8.0"
        activate-environment: true
        enable-cache: true
        github-token: ${{ github.token }}

    - name: Cache uv virtual environment
      uses: actions/cache@v5
      with:
        path: .venv
        key: uv-venv-${{ runner.os }}-${{ matrix.python-version || '3.11' }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          uv-venv-${{ runner.os }}-${{ matrix.python-version || '3.11' }}-

    - shell: bash
      run: uv sync --extra dev --extra vllm
