name: setup-uv-project
description: Install uv and set up the project with its dependencies

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  extras:
    description: 'Comma-separated extras to install (e.g. "dev", "dev,lmharness")'
    required: false
    default: 'dev'

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v6
      with:
        version: ">=0.11.5"  # introduction of per-index exclude-newer support
        activate-environment: true
        enable-cache: true
        github-token: ${{ github.token }}
        python-version: ${{ inputs.python-version }}

    - shell: bash
      run: uv pip install ".[${{ inputs.extras }}]"
